spring.application.name=subastas-api
server.port=8080

# H2 para desarrollo
spring.datasource.url=jdbc:h2:mem:subastasdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — en producción sobreescribir con la variable de entorno JWT_SECRET
jwt.secret=${JWT_SECRET:c3ViYXN0YXMtZGV2LXNlY3JldC1rZXktMzItYnl0ZXM=}
jwt.expiration=86400000

# Mail (configurar para producción)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Multipart
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=50MB

# Uploads
app.uploads.base-path=${UPLOADS_PATH:uploads}

# Logging
logging.level.com.subastas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO
